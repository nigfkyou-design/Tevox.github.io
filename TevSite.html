<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tevoxx | Root</title>
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #666666;
            --accent: #ffffff;
            --glow: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            /* Grid background decoration */
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Decorative glow in the background */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            z-index: -1;
        }

        .terminal-window {
            background-color: var(--surface);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 700px; /* Larger window */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Terminal Header Decor */
        .terminal-header {
            background-color: #111;
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #222;
        }

        .terminal-title {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content {
            padding: 50px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 20px 0;
            font-weight: normal;
            letter-spacing: -1px;
        }

        .directory {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-item {
            border-left: 1px solid var(--border);
            padding-left: 15px;
        }

        .label {
            display: block;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .value {
            font-size: 0.95rem;
        }

        .btn-container {
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .guns-link {
            display: inline-block;
            color: var(--bg);
            background-color: var(--accent);
            text-decoration: none;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s ease;
        }

        .guns-link:hover {
            background-color: transparent;
            color: var(--accent);
            outline: 1px solid var(--accent);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .content { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="terminal-title">Tevox Profile</div>
            <div></div>
        </div>

        <div class="content">
            <div class="directory">~/home/tevoxx</div>
            <h1>Tevoxx</h1>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="label">Field</span>
                    <span class="value">Osint Learner</span>
                </div>
                <div class="stat-item">
                    <span class="label">Languages</span>
                    <span class="value">Python, HTML, CSS, C++</span>
                </div>
                <div class="stat-item">
                    <span class="label">Specialization</span>
                    <span class="value">Discord Bot Developer</span>
                </div>
                <div class="stat-item">
                    <span class="label">Status</span>
                    <span class="value">Online</span>
                </div>
            </div>

            <div class="btn-container">
                <a href="https://guns.lol/tevoxx" target="_blank" class="guns-link">ACCESS GUNS.LOL</a>
            </div>
        </div>
    </div>

</body>
</html>
